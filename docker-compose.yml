services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: yu-ai-agent-postgres
    environment:
      POSTGRES_DB: yu_ai_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433"
    volumes:
      - yu_ai_agent_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: yu-ai-agent-redis
    ports:
      - "6380:6379"

volumes:
  yu_ai_agent_postgres_data: